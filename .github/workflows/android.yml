name: Android CI

on: [workflow_dispatch]

env:
  # Opt into Node.js 24 for JavaScript actions now
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5  # Updated to v5 (Node.js 24 compatible)
      - name: Set up JDK 17
        uses: actions/setup-java@v4  # v4 is fine if FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 is set
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'  # 💡 Bonus: cache Gradle dependencies
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7  # Keep artifacts for 1 week
